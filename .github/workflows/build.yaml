name: Build Modpack

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24'

      - name: Install Packwiz from source
        run: |
          echo "Compiling packwiz (dependencies will be downloaded)..."
          go install github.com/packwiz/packwiz@latest

      - name: Refresh and validate
        run: packwiz refresh

      - name: Export to CurseForge
        run: packwiz curseforge export -o curseforge-pack.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modpack-exports
          path: |
            curseforge-pack.zip