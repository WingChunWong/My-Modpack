name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go install github.com/packwiz/packwiz@latest

      - run: packwiz refresh

      - name: Export Modrinth
        run: |
          packwiz modrinth export
          # Move icon to mrpack root for Modrinth display
          ORIG=$(ls *.mrpack)
          unzip "$ORIG" -d mrpack_tmp
          mv mrpack_tmp/overrides/icon.png mrpack_tmp/icon.png 2>/dev/null || true
          cd mrpack_tmp && zip -r ../My-Modpack-${{ inputs.version || github.run_number }}.mrpack .
          rm -rf mrpack_tmp "$ORIG"

      - name: Export CurseForge
        run: packwiz curseforge export

      - uses: actions/upload-artifact@v4
        with:
          name: modpack
          path: |
            *.mrpack
            *.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: My-Modpack ${{ github.ref_name }}
          files: |
            *.mrpack
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}